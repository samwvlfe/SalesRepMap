<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/DS-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>salesrepmap</title>
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
      position: relative;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    .stack {
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      background-color: #fff;
      opacity: 0.8;
      height: 60px;
      position: fixed;
      top: 0;
      width: 100vw;
      z-index: 100;
      border-bottom: 2px solid black;
    }
    .user-popup {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 80px;
      right: 20px;
      z-index: 100;
      max-width: 400px;
      width: 400px;
      border-radius: 8px;
      overflow: hidden;
    }
    .user-popup-hdr {
      background-color: #be4e30;
      display: flex;
      flex-direction: column;
      color: white;
      gap: 15px;
      padding: 10px 0;
      border-radius: 10px 10px 0 0;
    }
    .hdr-toprow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }
    .user-popup-hdr .exit {
      border: 1px solid white;
      width: 20px;
      height: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .user-popup-hdr .add {
      border: 1px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .contact-title-cont {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .contact-title #contact_name {
      font-size: 20px;
    }
    .contact-title #contact_company {
      font-size: 13px;
    }
    .contact-thumbnail img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .contact-thumbnail .initials-avatar {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #c35c40;
      color: white;
      font-size: 15px;
      font-weight: bold;
      justify-content: center;
      align-items: center;
    }
    .comm-row {
      display: flex;
      gap: 20px;
      margin: 0 auto;
    }
    .comm-row .comm-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .comm-row .comm-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #c35c40;
      border: 1px solid #d17c64;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .comm-item span {
      font-size: 12px;
    }
    .user-popup-content {
      background-color: #f0f0f0;
      max-height: 65vh;
      overflow: hidden;
      overflow-y: auto;
      padding: 10px 15px;
      border-radius: 0 0 10px 10px;
    }
    .content-title {
      font-size: 18px;
      padding: 0 0 0 10px;
      color: #4b4b4b;
    }
    .content-box {
      display: flex;
      justify-content: space-between;
      background-color: #fff;
      border: 1px solid #d6d6d6;
      padding: 5px;
    }
    .content-box + .content-box {
      border-top: none;
    }
    .content-box:first-of-type {
      border-radius: 8px 8px 0 0;
    }
    .content-box:last-of-type {
      border-radius: 0 0 8px 8px;
    }
    .content-box .box-title {
      font-size: 10px;
      color: #939393;
    }
    .content-box .box-content {
      font-size: 15px;
      color: #be4e30;
      min-height: 1.2em;
    }
    .content-box .box-content.hov:hover {
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
  <body>
    <header>
      <div class="header">
        <div class="header-txt">DockStar Sales Rep Map</div>
      </div>
    </header>
    <aside>
      <div class="user-popup" id="user-popup">
        <div class="user-popup-hdr">
          <div class="hdr-toprow">
            <div class="exit" id="popup-exit">X</div>
            <div class="contact-title-cont">
              <div class="contact-thumbnail">
                <img id="contact-photo" src="src/assets/DS-icon.png" alt="contact photo">
                <div class="initials-avatar" id="contact-initials"></div>
              </div>
              <div class="contact-title stack">
                <div id="contact_name"></div>
                <div id="contact_company1"></div>
              </div>
            </div>
            <div class="add">+</div>
          </div>
          <div class="comm-row">
            <div class="comm-item">
              <a id="contact_email1" href=`mailto:${contact_email}`>
                <div class="comm-icon">E</div>
              </a>
              <span>Email</span>
            </div>
            <div class="comm-item">
              <a id="phone_number2" href=`tel:${contact_email}`>
                <div class="comm-icon">P</div>
              </a>
              <span>Phone</span>
            </div>
            <!-- <div class="comm-item">
              <div class="comm-icon">T</div>
              <span>Text</span>
            </div> -->
          </div>
        </div>
        <div class="user-popup-content stack">
          <div class="content-title">About this contact</div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Phone Number</div>
              <div class="box-content hov" id="phone_number2"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Email</div>
              <div class="box-content hov" id="contact_email1"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Job Title</div>
              <div class="box-content" id="job_title"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Company Name</div>
              <div class="box-content" id="contact_company2"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Contact Owner</div>
              <div class="box-content" id="contact_owner"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Lifecycle Stage</div>
              <div class="box-content" id="lifecycle_stage"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Lead Status</div>
              <div class="box-content" id="lead_status"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Street Address</div>
              <div class="box-content" id="addy_street"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">City</div>
              <div class="box-content" id="addy_city"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">State/Region</div>
              <div class="box-content" id="addy_state_region"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Postal Code</div>
              <div class="box-content" id="addy_postal"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Notes</div>
              <div class="box-content" id="notes"></div>
            </div>
          </div>
          <div class="content-box">
            <div class="stack">
              <div class="box-title">Message</div>
              <div class="box-content" id="message"></div>
            </div>
          </div>
        </div>
      </div>
    </aside>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      document.getElementById('popup-exit').addEventListener('click', () => {
        document.getElementById('user-popup').style.display = 'none';
      });
    </script>
  </body>
</html>
